apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: selfos-ingress
  namespace: selfos
spec:
  ingressClassName: nginx

  rules:
  - host: selfos.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: selfos-frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: selfos-backend
            port:
              number: 8080
