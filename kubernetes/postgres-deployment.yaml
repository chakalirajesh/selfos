apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: selfos

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16

          env:
            - name: POSTGRES_DB
              value: selfos

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

          ports:
            - containerPort: 5432