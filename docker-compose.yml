version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: selfos-postgres

    environment:
      POSTGRES_DB: selfos
      POSTGRES_USER: selfos
      POSTGRES_PASSWORD: selfos123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile

    container_name: selfos-backend

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/selfos
      SPRING_DATASOURCE_USERNAME: selfos
      SPRING_DATASOURCE_PASSWORD: selfos123

    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: selfos-frontend

    depends_on:
      - backend

    ports:
      - "3000:80"

volumes:
  postgres_data:
